<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VFlare Studios</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Geist+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1b2e;
      --fg: #e8eef8;
      --muted: rgba(180, 200, 240, 0.4);
      --pink: #ff4d8f;
      --orange: #ff9c2a;
      --teal: #00e5cc;
      --purple: #a855f7;
      --yellow: #ffe94d;
      --green: #4dffb0;
    }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Geist Mono', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    #stars { position: fixed; inset: 0; z-index: 0; }
    .corner { position: fixed; width: 18px; height: 18px; opacity: 0.25; z-index: 2; }
    .corner--tl { top: 22px; left: 22px; border-top: 1px solid var(--fg); border-left: 1px solid var(--fg); }
    .corner--tr { top: 22px; right: 22px; border-top: 1px solid var(--fg); border-right: 1px solid var(--fg); }
    .corner--bl { bottom: 22px; left: 22px; border-bottom: 1px solid var(--fg); border-left: 1px solid var(--fg); }
    .corner--br { bottom: 22px; right: 22px; border-bottom: 1px solid var(--fg); border-right: 1px solid var(--fg); }
    .container { position: relative; z-index: 1; text-align: center; padding: 40px 24px; }
    .eyebrow {
      font-size: 10px; font-weight: 300; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--teal); margin-bottom: 28px;
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 10vw, 96px); font-weight: 300; line-height: 1;
      color: var(--fg); margin-bottom: 20px;
      text-shadow: 0 0 60px rgba(100,140,255,0.3);
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.35s both;
    }
    .divider {
      width: 40px; height: 1px;
      background: linear-gradient(90deg, var(--pink), var(--orange), var(--yellow), var(--teal), var(--purple));
      margin: 0 auto 20px;
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s both;
    }
    .tagline {
      font-size: 11px; font-weight: 300; letter-spacing: 0.18em;
      color: var(--muted); text-transform: uppercase;
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.65s both;
    }
    .games-link {
      display: inline-block; margin-top: 52px; font-size: 10px;
      letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted);
      text-decoration: none; border-bottom: 1px solid rgba(180,200,240,0.2);
      padding-bottom: 3px; transition: color 0.3s, border-color 0.3s;
      opacity: 0; animation: fadeUp 1s cubic-bezier(0.16,1,0.3,1) 0.8s both;
    }
    .games-link:hover { color: var(--green); border-color: var(--green); }
    .footer {
      position: fixed; bottom: 20px; left: 0; right: 0;
      text-align: center; font-size: 9px; letter-spacing: 0.15em;
      color: rgba(180,200,240,0.18); text-transform: uppercase; z-index: 2;
    }
    .footer a { color: inherit; text-decoration: none; transition: color 0.3s; }
    .footer a:hover { color: var(--teal); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <canvas id="stars"></canvas>
  <div class="corner corner--tl"></div>
  <div class="corner corner--tr"></div>
  <div class="corner corner--bl"></div>
  <div class="corner corner--br"></div>
  <div class="container">
    <p class="eyebrow">Independent Game Studio</p>
    <h1>VFlare Studios</h1>
    <div class="divider"></div>
    <p class="tagline">Crafting mobile experiences</p>
    <a href="/popblox" class="games-link">Our Games →</a>
  </div>
  <div class="footer">
    <a href="/privacy-policy.html">Privacy Policy</a>
    &nbsp;&nbsp;·&nbsp;&nbsp;
    &copy; 2026 VFlare Studios
  </div>
  <script>
    const canvas = document.getElementById('stars');
    const ctx = canvas.getContext('2d');
    let stars = [];
    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    function initStars() {
      stars = [];
      const count = Math.floor((canvas.width * canvas.height) / 3000);
      const colors = ['200,220,255', '255,77,143', '0,229,204', '168,85,247', '255,233,77', '77,255,176'];
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const spd = Math.random() * 0.08 + 0.02;
        stars.push({
          x: Math.random() * canvas.width, y: Math.random() * canvas.height,
          r: Math.random() * 1.2 + 0.2, alpha: Math.random() * 0.7 + 0.1,
          twinkleSpeed: Math.random() * 0.015 + 0.003,
          offset: Math.random() * Math.PI * 2,
          color: colors[Math.floor(Math.random() * colors.length)],
          vx: Math.cos(angle) * spd,
          vy: Math.sin(angle) * spd
        });
      }
    }
    let t = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      t += 0.008;
      stars.forEach(s => {
        s.x += s.vx;
        s.y += s.vy;
        if (s.x < -2) s.x = canvas.width + 2;
        if (s.x > canvas.width + 2) s.x = -2;
        if (s.y < -2) s.y = canvas.height + 2;
        if (s.y > canvas.height + 2) s.y = -2;
        const twinkle = s.alpha * (0.6 + 0.4 * Math.sin(t * s.twinkleSpeed * 60 + s.offset));
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(${s.color},${twinkle})`;
        ctx.fill();
      });
      requestAnimationFrame(draw);
    }
    resize(); initStars(); draw();
    window.addEventListener('resize', () => { resize(); initStars(); });
  </script>
</body>
</html>
